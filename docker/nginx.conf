worker_processes 4;
error_log stderr warn;
pid /run/nginx.pid;

events
{
	worker_connections 1024;
}

http
{
	include mime.types;
	default_type application/octet-stream;

	# Limit Execution Timeout
	fastcgi_read_timeout 300;
	proxy_read_timeout 300;

	# Define custom log format to include reponse times
	log_format main_timed '$remote_addr - $remote_user [$time_local] "$request" '
	'$status $body_bytes_sent "$http_referer" '
	'"$http_user_agent" "$http_x_forwarded_for" '
	'$request_time $upstream_response_time $pipe $upstream_cache_status';

	access_log /var/log/nginx/access.log main_timed;
	error_log /var/log/nginx/error.log notice;

	keepalive_timeout 65;

	# Write temporary files to /tmp so they can be created as a non-privileged user
	client_body_temp_path /tmp/client_temp;
	proxy_temp_path /tmp/proxy_temp_path;
	fastcgi_temp_path /tmp/fastcgi_temp;
	uwsgi_temp_path /tmp/uwsgi_temp;
	scgi_temp_path /tmp/scgi_temp;

	# Default server definition
	server
	{
		listen 8080 default_server;
		server_name localhost _;

		sendfile off;
		client_max_body_size 0;
		fastcgi_buffers 64 4K;
		server_tokens off;

		root /var/www/html/public;
		index index.php;

		location /
		{
			# First attempt to serve request as file, then
			# as directory, then fall back to index.php
			try_files $uri $uri/ /index.php?q=$uri&$args;
		}

		# Redirect server error pages to the static page /50x.html
		error_page 500 502 503 504 /50x.html;
		location = /50x.html
		{
			root /var/lib/nginx/html;
		}

		# Pass the PHP scripts to PHP-FPM listening on 127.0.0.1:9000
		location ~ \.php$
		{
			try_files $uri =404;
			fastcgi_split_path_info ^(.+\.php)(/.+)$;
			fastcgi_pass 127.0.0.1:9000;
			fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
			fastcgi_param SCRIPT_NAME $fastcgi_script_name;
			fastcgi_index index.php;
			include fastcgi_params;
		}

		add_header "Cache-Control" "max-age=0, no-cache, no-store, must-revalidate";
		add_header X-Content-Type-Options nosniff;
		add_header X-Frame-Options SAMEORIGIN;

		add_header X-XSS-Protection "1; mode=block";
		add_header X-Robots-Tag none;


		# Static assets: exclude /livewire/ and /flux/ so Laravel can serve their JS/CSS via routes
		location ~* ^(?!/(flux|livewire)/).*\.(jpg|jpeg|gif|png|css|js|ico|bmp|swf)$
		{
			expires 5d;
			access_log off;
		}

		# Deny access to . files, for security
		location ~ /\.
		{
			log_not_found off;
			deny all;
		}

		location ~ ^/(?:\.htaccess|data|config|db_structure\.xml|README\.git\.env)
		{
			deny all;
		}

		# Allow fpm ping and status from localhost
		location ~ ^/(fpm-status|fpm-ping)$
		{
			access_log off;
			allow 127.0.0.1;
			deny all;
			fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
			include fastcgi_params;
			fastcgi_pass 127.0.0.1:9000;
		}
		# Include other server configs
		include /etc/nginx/conf.d/*.conf;
	}
}
