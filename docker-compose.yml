version: "3.8"

services:
  app:
    image: 10.25.255.133:5000/kesra-scholarship:${IMAGE_TAG}
    ports:
      - target: 8080 # Container port
        published: 8114 # Host port exposed on the nodes
        protocol: tcp
        mode: host
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: on-failure
        max_attempts: 3
      update_config:
        parallelism: 1
        delay: 5s
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
        reservations:
          cpus: "0.10"
          memory: 64M
      labels:
        # Enable Service discovery for Traefik
        - "traefik.enable=true"
        # Define the service and port
        - "traefik.http.services.kesra-scholarship.loadbalancer.server.port=80"
        # Define the router rule
        - "traefik.http.routers.kesra-scholarship.rule=Host(`swarm.localhost`) && PathPrefix(`/kesra-scholarship`)"
        # Link router to service
        - "traefik.http.routers.kesra-scholarship.service=kesra-scholarship"
        # Expose kesra-scholarship on the HTTPS entrypoint
        - "traefik.http.routers.kesra-scholarship.entrypoints=websecure"
        # Note: No path manipulation middleware - Next.js handles the basePath internally
    networks:
      - traefik_proxy_network

networks:
  traefik_proxy_network:
    name: "traefik_proxy_network"
    external: true
